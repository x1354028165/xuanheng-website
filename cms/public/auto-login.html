<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CMS 后台 · 自动登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
    .status {
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 24px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .loading { background: #1e40af22; color: #60a5fa; border: 1px solid #1e40af44; }
    .success { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .error   { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #60a5fa44;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: none;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #38C4E8;
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .hint { font-size: 12px; color: #64748b; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚙️</div>
    <h1>CMS 后台</h1>
    <p class="sub">旭衡电子 · 内容管理系统</p>
    <div class="status loading" id="st">
      <div class="spinner"></div>
      <span id="msg">正在登录...</span>
    </div>
    <button class="btn" id="retryBtn" onclick="login()">重新登录</button>
    <p class="hint" id="hint">正在获取登录凭证，请稍候</p>
  </div>

  <script>
    function setStatus(type, text) {
      var el = document.getElementById('st');
      el.className = 'status ' + type;
      el.innerHTML = (type === 'loading' ? '<div class="spinner"></div>' : (type === 'success' ? '✅' : '❌')) + ' <span>' + text + '</span>';
    }

    function login() {
      document.getElementById('retryBtn').style.display = 'none';
      setStatus('loading', '正在登录...');
      document.getElementById('hint').textContent = '正在获取登录凭证，请稍候';

      // 同源请求，无跨域问题
      fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: 'admin@alwayscontrol.com.cn', password: 'Admin1234!' })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var token = data && data.data && (data.data.token || data.data.accessToken);
        if (!token) throw new Error(JSON.stringify(data.error || data));
        localStorage.setItem('jwtToken', token);
        localStorage.setItem('strapi-admin-token', token);
        if (data.data.user) localStorage.setItem('userInfo', JSON.stringify(data.data.user));
        setStatus('success', '登录成功，正在跳转...');
        document.getElementById('hint').textContent = '即将进入后台管理界面';
        setTimeout(function() { window.location.href = '/admin'; }, 600);
      })
      .catch(function(err) {
        setStatus('error', '登录失败');
        document.getElementById('hint').textContent = err.message || '请检查网络';
        document.getElementById('retryBtn').style.display = 'block';
      });
    }

    window.onload = login;
  </script>
</body>
</html>
